<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitLink</title>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#007AFF" />

    <!-- SEO -->
    <meta
      name="description"
      content="FitLink - 트레이너와 회원을 연결하는 PT 매니저. 예약, 스케줄, 운동 관리를 한 곳에서."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FitLink - PT 매니저" />
    <meta
      property="og:description"
      content="트레이너와 회원을 연결하는 PT 매니저. 예약, 스케줄, 운동 관리를 한 곳에서."
    />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FitLink" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
