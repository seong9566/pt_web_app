name: CI

# 실행 조건
# 1) dev 또는 main 대상으로 PR 생성/업데이트 될 때 CI 실행
# 2) dev 브랜치에 반영된 최종 결과도 한 번 더 검증 (push)
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

# 같은 워크플로우/브랜치에서 새 실행이 생기면 이전 실행은 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 프로덕션 빌드 검증 + dist 아티팩트 업로드
  build:
    runs-on: ubuntu-latest
    steps:
      # 저장소 체크아웃
      - uses: actions/checkout@v4
      # Node 20 환경 구성 및 npm 캐시 활성화
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      # lockfile 기반 의존성 설치
      - run: npm ci
      # Vite 빌드가 깨지지 않는지 확인
      - run: npm run build
      # 필요 시 확인할 수 있도록 빌드 산출물 업로드
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 단위 테스트 실행 (Vitest)
  test:
    runs-on: ubuntu-latest
    steps:
      # 저장소 체크아웃
      - uses: actions/checkout@v4
      # Node 20 환경 구성 및 npm 캐시 활성화
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      # lockfile 기반 의존성 설치
      - run: npm ci
      # 테스트 실패 시 워크플로우 실패
      - run: npm test
